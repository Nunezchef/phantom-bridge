<style>
.pb-chat-btn {
    opacity: 0.5;
    transition: all 0.2s;
}
.pb-chat-btn:hover {
    opacity: 0.8 !important;
    background-color: rgba(99, 102, 241, 0.12) !important;
}
.pb-chat-btn.pb-live {
    color: #6366f1 !important;
    opacity: 0.85 !important;
}
.pb-chat-btn.pb-live:hover {
    opacity: 1 !important;
    background-color: rgba(99, 102, 241, 0.2) !important;
}
</style>

<button
    type="button"
    class="text-button pb-chat-btn"
    :class="{ 'pb-live': globalThis._phantomBridgeRunning }"
    @click="globalThis._phantomBridgeToggle && globalThis._phantomBridgeToggle()"
    title="Open Phantom Bridge — browse inside A0's container"
>
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="14" height="14" aria-hidden="true">
        <path d="M12 2C7.58 2 4 5.58 4 10c0 1.5.5 3 1.2 4.2.1.2.1.4 0 .5L4 20l3-1.5c.2-.1.4-.1.5 0C8.8 19.2 10.3 20 12 20c4.42 0 8-3.58 8-8s-3.58-10-8-10zm-3 11a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm6 0a1.5 1.5 0 110-3 1.5 1.5 0 010 3z"/>
    </svg>
    <p>Bridge</p>
</button>

<script>
(async () => {
    const { callJsonApi } = await import("/js/api.js");

    globalThis._phantomBridgeRunning = false;
    let modalInjected = false;

    // Inject the modal HTML into the page on first use
    async function ensureModalInjected() {
        if (modalInjected || document.getElementById('phantom-bridge-modal')) {
            modalInjected = true;
            return true;
        }
        try {
            const resp = await fetch("/usr/plugins/phantom_bridge/webui/bridge-modal.html");
            if (!resp.ok) return false;
            const html = await resp.text();
            const container = document.createElement('div');
            container.innerHTML = html;

            // Extract and execute scripts separately
            const scripts = container.querySelectorAll('script');
            const scriptContents = [];
            scripts.forEach(s => {
                scriptContents.push(s.textContent);
                s.remove();
            });

            // Inject HTML (styles + DOM)
            document.body.appendChild(container);

            // Execute scripts
            for (const code of scriptContents) {
                const scriptEl = document.createElement('script');
                scriptEl.textContent = code;
                document.body.appendChild(scriptEl);
            }

            modalInjected = true;
            // Wait a tick for scripts to initialize
            await new Promise(r => setTimeout(r, 100));
            return true;
        } catch (e) {
            console.error('[phantom_bridge] Failed to inject modal:', e);
            return false;
        }
    }

    async function checkStatus() {
        try {
            const res = await callJsonApi("plugins/phantom_bridge/bridge", { action: "status" });
            globalThis._phantomBridgeRunning = res?.running || false;
        } catch (e) {
            globalThis._phantomBridgeRunning = false;
        }
    }

    globalThis._phantomBridgeToggle = async function () {
        // Inject modal if not already done
        const injected = await ensureModalInjected();

        if (injected && globalThis._phantomBridgeModalToggle) {
            await globalThis._phantomBridgeModalToggle();
            checkStatus();
        } else {
            // Final fallback: open in new tab
            if (globalThis._phantomBridgeRunning) {
                window.open("/usr/plugins/phantom_bridge/webui/bridge.html", "_blank");
            } else {
                try {
                    if (globalThis.toast) globalThis.toast("Starting Phantom Bridge...", "info");
                    const res = await callJsonApi("plugins/phantom_bridge/bridge", { action: "start" });
                    if (res?.running || res?.ok) {
                        globalThis._phantomBridgeRunning = true;
                        if (globalThis.toast) globalThis.toast("Bridge is live!", "success");
                        await new Promise(r => setTimeout(r, 3000));
                        window.open("/usr/plugins/phantom_bridge/webui/bridge.html", "_blank");
                    } else {
                        if (globalThis.toast) globalThis.toast(res?.error || "Failed to start bridge", "error");
                    }
                } catch (e) {
                    if (globalThis.toast) globalThis.toast("Error: " + e.message, "error");
                }
            }
        }
    };

    checkStatus();
    setInterval(checkStatus, 30000);
})();
</script>
