<!--
  Phantom Bridge -- In-app draggable browser modal
  Self-contained: CSS + HTML + vanilla JS (no framework dependencies)
  Injected via modal-shell-end extension point
-->

<div id="pb-modal" style="display:none;">
  <!-- Title Bar (drag handle) -->
  <div id="pb-titlebar">
    <div id="pb-titlebar-left">
      <div id="pb-traffic-lights">
        <span class="pb-dot pb-dot-close" title="Close"></span>
        <span class="pb-dot pb-dot-minimize" title="Minimize"></span>
        <span class="pb-dot pb-dot-green"></span>
      </div>
      <span id="pb-title">Phantom Bridge</span>
    </div>
  </div>

  <!-- Collapsible body -->
  <div id="pb-body">
    <!-- Tab bar -->
    <div id="pb-tabs"></div>

    <!-- URL bar -->
    <div id="pb-urlbar-row">
      <button id="pb-nav-back" title="Back">&#8592;</button>
      <button id="pb-nav-refresh" title="Refresh">&#8635;</button>
      <div id="pb-url-wrap">
        <input id="pb-url-input" type="text" placeholder="Search or enter URL" spellcheck="false" autocomplete="off">
        <span id="pb-url-arrow">&#8594;</span>
      </div>
    </div>

    <!-- Screenshot area (focusable for keyboard capture) -->
    <div id="pb-viewport" tabindex="0">
      <div id="pb-loading">
        <div class="pb-spinner"></div>
        <span>Connecting to bridge...</span>
      </div>
      <img id="pb-screenshot" alt="Browser view" draggable="false" style="display:none;">
      <div id="pb-kb-hint">Click to focus for keyboard input</div>
    </div>
  </div>

  <!-- Resize handle -->
  <div id="pb-resize-handle">
    <svg width="12" height="12" viewBox="0 0 12 12">
      <circle cx="9" cy="3" r="1" fill="rgba(255,255,255,0.25)"/>
      <circle cx="5" cy="7" r="1" fill="rgba(255,255,255,0.25)"/>
      <circle cx="9" cy="7" r="1" fill="rgba(255,255,255,0.25)"/>
      <circle cx="9" cy="11" r="1" fill="rgba(255,255,255,0.25)"/>
    </svg>
  </div>
</div>

<style>
  /* ── Modal shell ── */
  #pb-modal {
    position: fixed;
    z-index: 2500;
    width: 900px;
    height: 650px;
    min-width: 450px;
    min-height: 350px;
    bottom: 24px;
    right: 24px;
    background: #1c1c1e;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui, sans-serif;
    color: rgba(255,255,255,0.87);
    user-select: none;
  }

  /* ── Title bar ── */
  #pb-titlebar {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 36px;
    padding: 0 12px;
    background: rgba(44,44,46,0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    cursor: grab;
    flex-shrink: 0;
    position: relative;
  }
  #pb-titlebar:active { cursor: grabbing; }

  #pb-titlebar-left {
    position: absolute;
    left: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  #pb-title {
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0.6;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 300px;
  }

  /* Traffic light dots */
  #pb-traffic-lights {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .pb-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: opacity 0.15s;
    position: relative;
  }
  .pb-dot-close { background: #ff5f57; }
  .pb-dot-minimize { background: #febc2e; }
  .pb-dot-green { background: #28c840; cursor: default; }

  /* Show symbols on hover */
  #pb-traffic-lights:hover .pb-dot::after {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 9px;
    font-weight: 700;
    line-height: 1;
    color: rgba(0,0,0,0.5);
  }
  #pb-traffic-lights:hover .pb-dot-close::after { content: "\00d7"; font-size: 11px; }
  #pb-traffic-lights:hover .pb-dot-minimize::after { content: "\2013"; font-size: 10px; }

  /* ── Body ── */
  #pb-body {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  #pb-modal.pb-minimized #pb-body { display: none; }
  #pb-modal.pb-minimized #pb-resize-handle { display: none; }
  #pb-modal.pb-minimized { height: auto !important; min-height: 0 !important; }

  /* ── Tab bar ── */
  #pb-tabs {
    display: flex;
    gap: 4px;
    padding: 6px 10px;
    background: rgba(28,28,30,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }
  #pb-tabs::-webkit-scrollbar { display: none; }
  #pb-tabs:empty { display: none; }

  .pb-tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    height: 28px;
    background: rgba(255,255,255,0.04);
    border: 1px solid transparent;
    border-radius: 14px;
    font-size: 0.72rem;
    cursor: pointer;
    white-space: nowrap;
    max-width: 150px;
    color: rgba(255,255,255,0.5);
    transition: all 0.15s ease;
    flex-shrink: 0;
  }
  .pb-tab:hover {
    background: rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.7);
  }
  .pb-tab.active {
    background: rgba(99,102,241,0.15);
    border-color: rgba(99,102,241,0.3);
    color: #fff;
  }
  .pb-tab-label {
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
  }
  .pb-tab-close {
    font-size: 8px;
    width: 14px;
    height: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    opacity: 0.3;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.15s;
    background: transparent;
    border: none;
    color: inherit;
    padding: 0;
    line-height: 1;
  }
  .pb-tab-close:hover {
    opacity: 1;
    background: rgba(255,255,255,0.12);
  }

  /* ── URL bar ── */
  #pb-urlbar-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    background: rgba(28,28,30,0.95);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  #pb-urlbar-row button {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    color: rgba(255,255,255,0.4);
    transition: all 0.15s;
    padding: 0;
    flex-shrink: 0;
  }
  #pb-urlbar-row button:hover {
    color: rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.06);
  }

  #pb-url-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
  }
  #pb-url-input {
    width: 100%;
    height: 32px;
    padding: 0 28px 0 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: rgba(255,255,255,0.87);
    font-size: 0.8rem;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    outline: none;
    transition: box-shadow 0.2s, border-color 0.2s;
  }
  #pb-url-input:focus {
    border-color: rgba(99,102,241,0.4);
    box-shadow: 0 0 0 2px rgba(99,102,241,0.3);
  }
  #pb-url-input::placeholder {
    color: rgba(255,255,255,0.2);
  }
  #pb-url-arrow {
    position: absolute;
    right: 8px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.2);
    pointer-events: none;
  }

  /* ── Viewport ── */
  #pb-viewport {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #0d0d0f;
    cursor: default;
    outline: none;
    min-height: 0;
    border-radius: 0 0 12px 12px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  #pb-viewport:focus {
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3), 0 0 0 2px rgba(99,102,241,0.4);
  }
  #pb-viewport:focus #pb-kb-hint { display: none; }

  #pb-screenshot {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  #pb-loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-size: 0.8rem;
    color: rgba(255,255,255,0.3);
  }

  /* Spinner */
  .pb-spinner {
    width: 28px;
    height: 28px;
    border: 2px solid rgba(99,102,241,0.15);
    border-top-color: rgba(99,102,241,0.6);
    border-radius: 50%;
    animation: pb-spin 0.8s linear infinite;
  }
  @keyframes pb-spin {
    to { transform: rotate(360deg); }
  }

  /* Shimmer loading overlay */
  .pb-shimmer::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(99,102,241,0.04) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: pb-shimmer 1.5s ease-in-out infinite;
    pointer-events: none;
    border-radius: 0 0 12px 12px;
  }
  @keyframes pb-shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Keyboard hint */
  #pb-kb-hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.7rem;
    color: rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    padding: 3px 10px;
    border-radius: 10px;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  /* ── Resize handle ── */
  #pb-resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 16px;
    height: 16px;
    cursor: nwse-resize;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.15;
    transition: opacity 0.2s;
    border-radius: 0 0 12px 0;
  }
  #pb-resize-handle:hover { opacity: 0.4; }
</style>

<script>
(function() {
  // -- State --
  var currentPageId = null;
  var pages = [];
  var screenshotTimer = null;
  var pagesTimer = null;
  var keyDebounceTimer = null;
  var isMinimized = false;
  var isDragging = false;
  var isResizing = false;
  var preMinimizeRect = null;

  // -- DOM refs --
  var modal      = document.getElementById("pb-modal");
  var titlebar   = document.getElementById("pb-titlebar");
  var dotClose   = document.querySelector(".pb-dot-close");
  var dotMin     = document.querySelector(".pb-dot-minimize");
  var tabsBar    = document.getElementById("pb-tabs");
  var urlInput   = document.getElementById("pb-url-input");
  var btnBack    = document.getElementById("pb-nav-back");
  var btnRefresh = document.getElementById("pb-nav-refresh");
  var viewport   = document.getElementById("pb-viewport");
  var imgEl      = document.getElementById("pb-screenshot");
  var loadingEl  = document.getElementById("pb-loading");
  var titleEl    = document.getElementById("pb-title");
  var kbHint     = document.getElementById("pb-kb-hint");
  var resizeHandle = document.getElementById("pb-resize-handle");

  // -- API helper --
  var _callJsonApi = null;
  async function getApi() {
    if (!_callJsonApi) {
      var mod = await import("/js/api.js");
      _callJsonApi = mod.callJsonApi;
    }
    return _callJsonApi;
  }
  async function api(endpoint, body) {
    var fn = await getApi();
    return fn("plugins/phantom_bridge/" + endpoint, body);
  }

  // -- Show / Hide --
  function show() {
    modal.style.display = "flex";
    globalThis._phantomBridgeModalVisible = true;
    if (isMinimized) {
      isMinimized = false;
      modal.classList.remove("pb-minimized");
    }
    startPolling();
    setTimeout(function() { viewport.focus(); }, 100);
  }

  function hide() {
    modal.style.display = "none";
    globalThis._phantomBridgeModalVisible = false;
    stopPolling();
  }

  function toggleMinimize() {
    isMinimized = !isMinimized;
    if (isMinimized) {
      // Save current position
      var rect = modal.getBoundingClientRect();
      preMinimizeRect = { top: rect.top, left: rect.left, width: rect.width, height: rect.height };
      // Snap to bottom-right
      modal.style.bottom = "24px";
      modal.style.right = "24px";
      modal.style.top = "auto";
      modal.style.left = "auto";
      modal.style.width = "280px";
      titleEl.textContent = "Phantom Bridge (" + pages.length + " tab" + (pages.length !== 1 ? "s" : "") + ")";
    } else {
      // Restore
      if (preMinimizeRect) {
        modal.style.top = preMinimizeRect.top + "px";
        modal.style.left = preMinimizeRect.left + "px";
        modal.style.bottom = "auto";
        modal.style.right = "auto";
        modal.style.width = preMinimizeRect.width + "px";
        modal.style.height = preMinimizeRect.height + "px";
      } else {
        modal.style.bottom = "24px";
        modal.style.right = "24px";
        modal.style.top = "auto";
        modal.style.left = "auto";
        modal.style.width = "900px";
        modal.style.height = "650px";
      }
      updateTitle();
    }
    modal.classList.toggle("pb-minimized", isMinimized);
  }

  function updateTitle() {
    var active = pages.find(function(p) { return p.id === currentPageId; });
    if (active && active.title) {
      titleEl.textContent = active.title.length > 40 ? active.title.substring(0, 40) + "..." : active.title;
    } else {
      titleEl.textContent = "Phantom Bridge";
    }
  }

  // -- Global toggle --
  globalThis._phantomBridgeModalToggle = async function() {
    if (modal.style.display === "none" || modal.style.display === "") {
      try {
        var status = await api("bridge", { action: "status" });
        if (!status.running) {
          if (globalThis.toast) globalThis.toast("Starting Phantom Bridge...", "info");
          await api("bridge", { action: "start" });
          await new Promise(function(r) { setTimeout(r, 2500); });
          if (globalThis.toast) globalThis.toast("Bridge is live!", "success");
        }
      } catch(e) {
        if (globalThis.toast) globalThis.toast("Bridge error: " + e.message, "error");
        return;
      }
      show();
    } else {
      hide();
    }
  };

  globalThis._phantomBridgeModalVisible = false;

  // -- Polling --
  function startPolling() {
    refreshPages();
    takeScreenshot();
    pagesTimer = setInterval(refreshPages, 5000);
    screenshotTimer = setInterval(takeScreenshot, 1500);
  }

  function stopPolling() {
    clearInterval(pagesTimer);
    clearInterval(screenshotTimer);
    pagesTimer = null;
    screenshotTimer = null;
  }

  // -- Pages --
  async function refreshPages() {
    try {
      var data = await api("proxy", { action: "pages" });
      if (!data.ok || !data.pages) return;
      pages = data.pages.filter(function(p) { return p.type === "page"; });

      if (!currentPageId && pages.length > 0) {
        currentPageId = pages[0].id;
      }

      // Render tabs
      tabsBar.innerHTML = pages.map(function(p) {
        var label = p.title || p.url || "New Tab";
        var cls = p.id === currentPageId ? "pb-tab active" : "pb-tab";
        return '<div class="' + cls + '" data-page-id="' + p.id + '" title="' + escHtml(p.url || '') + '">'
          + '<span class="pb-tab-label">' + escHtml(label) + '</span>'
          + '<button class="pb-tab-close" data-close-id="' + p.id + '" title="Close tab">&times;</button>'
          + '</div>';
      }).join("");

      var active = pages.find(function(p) { return p.id === currentPageId; });
      if (active) {
        urlInput.value = active.url || "";
      }

      updateTitle();
    } catch(e) { /* bridge not ready */ }
  }

  // Tab click + close delegation
  tabsBar.addEventListener("click", function(e) {
    // Close button
    var closeBtn = e.target.closest(".pb-tab-close");
    if (closeBtn) {
      e.stopPropagation();
      var closeId = closeBtn.dataset.closeId;
      closeTab(closeId);
      return;
    }
    // Tab select
    var tab = e.target.closest(".pb-tab");
    if (tab && tab.dataset.pageId) {
      currentPageId = tab.dataset.pageId;
      refreshPages();
      takeScreenshot();
    }
  });

  async function closeTab(tabId) {
    // Try to close via CDP (action may not exist yet)
    try {
      await api("proxy", { action: "close_tab", page_id: tabId });
    } catch(e) { /* ignore */ }

    // Remove from local list
    pages = pages.filter(function(p) { return p.id !== tabId; });

    // Switch to next tab if closing the active one
    if (currentPageId === tabId) {
      currentPageId = pages.length > 0 ? pages[0].id : null;
    }

    refreshPages();
    if (currentPageId) takeScreenshot();
  }

  // -- Screenshot --
  var screenshotLoading = false;
  async function takeScreenshot() {
    if (!currentPageId || screenshotLoading) return;
    screenshotLoading = true;

    // Add shimmer if image not yet loaded
    if (imgEl.style.display === "none") {
      viewport.classList.add("pb-shimmer");
    }

    try {
      var data = await api("proxy", { action: "screenshot", page_id: currentPageId });
      if (data.ok && data.screenshot) {
        imgEl.src = "data:image/jpeg;base64," + data.screenshot;
        imgEl.style.display = "block";
        loadingEl.style.display = "none";
        viewport.classList.remove("pb-shimmer");
      }
    } catch(e) { /* ignore */ }
    screenshotLoading = false;
  }

  // -- Navigate --
  async function navigate() {
    var url = urlInput.value.trim();
    if (!url) return;
    if (!url.startsWith("http://") && !url.startsWith("https://")) {
      url = "https://" + url;
    }
    if (!currentPageId && pages.length > 0) currentPageId = pages[0].id;
    if (!currentPageId) return;

    await api("proxy", { action: "navigate", page_id: currentPageId, url: url });
    urlInput.value = url;
    setTimeout(takeScreenshot, 1000);
    setTimeout(refreshPages, 1500);
  }

  urlInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") { navigate(); e.preventDefault(); }
    e.stopPropagation();
  });

  btnBack.addEventListener("click", function() { takeScreenshot(); refreshPages(); });
  btnRefresh.addEventListener("click", function() { takeScreenshot(); refreshPages(); });
  dotMin.addEventListener("click", function(e) { e.stopPropagation(); toggleMinimize(); });
  dotClose.addEventListener("click", function(e) { e.stopPropagation(); hide(); });

  // -- Click to interact --
  imgEl.addEventListener("click", async function(e) {
    if (!currentPageId) return;
    if (!imgEl.naturalWidth) return;

    var rect = imgEl.getBoundingClientRect();
    var x = Math.round((e.clientX - rect.left) * (1280 / rect.width));
    var y = Math.round((e.clientY - rect.top) * (900 / rect.height));

    try {
      await api("click", { page_id: currentPageId, x: x, y: y });
      viewport.focus();
      setTimeout(takeScreenshot, 500);
      setTimeout(refreshPages, 1000);
    } catch(err) {
      console.error("Bridge click failed:", err);
    }
  });

  // Click viewport to focus
  viewport.addEventListener("click", function() {
    viewport.focus();
  });

  // -- Keyboard input --
  viewport.addEventListener("keydown", function(e) {
    if (document.activeElement === urlInput) return;

    e.preventDefault();
    e.stopPropagation();
    sendKey(e);
  });

  viewport.addEventListener("keyup", function(e) {
    if (document.activeElement === urlInput) return;
    e.preventDefault();
    e.stopPropagation();
  });

  async function sendKey(e) {
    if (!currentPageId) return;

    var modifiers = (e.altKey ? 1 : 0) | (e.ctrlKey ? 2 : 0) | (e.metaKey ? 4 : 0) | (e.shiftKey ? 8 : 0);

    try {
      await api("keyboard", {
        page_id: currentPageId,
        key: e.key,
        code: e.code,
        text: e.key.length === 1 ? e.key : "",
        modifiers: modifiers
      });
    } catch(err) {
      console.error("Bridge keyboard failed:", err);
    }

    clearTimeout(keyDebounceTimer);
    keyDebounceTimer = setTimeout(takeScreenshot, 300);
  }

  // -- Drag --
  var dragOffsetX = 0, dragOffsetY = 0;

  titlebar.addEventListener("mousedown", function(e) {
    if (e.target.closest("#pb-traffic-lights")) return;
    isDragging = true;
    var rect = modal.getBoundingClientRect();
    dragOffsetX = e.clientX - rect.left;
    dragOffsetY = e.clientY - rect.top;

    modal.style.top = rect.top + "px";
    modal.style.left = rect.left + "px";
    modal.style.bottom = "auto";
    modal.style.right = "auto";
    e.preventDefault();
  });

  document.addEventListener("mousemove", function(e) {
    if (isDragging) {
      var x = Math.max(0, Math.min(e.clientX - dragOffsetX, window.innerWidth - 100));
      var y = Math.max(0, Math.min(e.clientY - dragOffsetY, window.innerHeight - 40));
      modal.style.left = x + "px";
      modal.style.top = y + "px";
      e.preventDefault();
    }
    if (isResizing) {
      var rect = modal.getBoundingClientRect();
      var newW = Math.max(450, e.clientX - rect.left);
      var newH = Math.max(350, e.clientY - rect.top);
      modal.style.width = newW + "px";
      modal.style.height = newH + "px";
      e.preventDefault();
    }
  });

  document.addEventListener("mouseup", function() {
    isDragging = false;
    isResizing = false;
  });

  // -- Resize --
  resizeHandle.addEventListener("mousedown", function(e) {
    isResizing = true;
    var rect = modal.getBoundingClientRect();
    modal.style.top = rect.top + "px";
    modal.style.left = rect.left + "px";
    modal.style.bottom = "auto";
    modal.style.right = "auto";
    e.preventDefault();
    e.stopPropagation();
  });

  // -- Utility --
  function escHtml(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
})();
