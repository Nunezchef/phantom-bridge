<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Bridge — Remote Browser</title>
    <script type="module" src="/plugins/phantom_bridge/webui/phantom-bridge-store.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f; color: #e0e0e0;
            height: 100vh; display: flex; flex-direction: column;
        }

        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px;
            background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
            flex-shrink: 0;
        }
        .header h1 { font-size: 1em; font-weight: 600; }
        .header .status {
            margin-left: auto; font-size: 0.8em;
            display: flex; align-items: center; gap: 6px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-on { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
        .dot-off { background: #666; }

        .vnc-frame {
            flex: 1; border: none; width: 100%;
            background: #0f0f0f;
        }

        .fallback {
            flex: 1; display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 16px; opacity: 0.5;
        }
        .fallback p { font-size: 0.9em; max-width: 400px; text-align: center; line-height: 1.5; }
        .fallback code {
            background: #222; padding: 8px 16px; border-radius: 8px;
            font-family: 'SF Mono', monospace; font-size: 0.85em;
        }
    </style>
</head>
<body>
    <div x-data>
        <template x-if="$store.phantomBridge">
            <div style="display:contents;" x-init="$store.phantomBridge.onOpen()">

                <div class="header">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <rect width="24" height="24" rx="6" fill="#6366f1"/>
                        <circle cx="12" cy="10" r="4" stroke="white" stroke-width="1.5" fill="none"/>
                        <path d="M8 18c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
                    </svg>
                    <h1>Phantom Bridge</h1>
                    <div class="status">
                        <span class="dot" :class="$store.phantomBridge.running ? 'dot-on' : 'dot-off'"></span>
                        <span x-text="$store.phantomBridge.running ? 'Bridge Open' : 'Offline'"></span>
                    </div>
                </div>

                <template x-if="$store.phantomBridge.novncReady">
                    <iframe class="vnc-frame"
                            :src="$store.phantomBridge.novncUrl"
                            allow="clipboard-read; clipboard-write">
                    </iframe>
                </template>

                <template x-if="!$store.phantomBridge.novncReady">
                    <div class="fallback">
                        <p>noVNC is not available. Make sure the bridge is running and dependencies are installed.</p>
                        <code>python execute.py</code>
                        <p>Then ask A0 to open the browser bridge.</p>
                    </div>
                </template>

            </div>
        </template>
    </div>
</body>
</html>
