<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Bridge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0f0f; color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            display: flex; align-items: center; gap: 12px;
            padding: 16px 24px;
            background: #1a1a1a; border-bottom: 1px solid #2a2a2a;
        }
        .header h1 { font-size: 1.1em; font-weight: 600; }
        .header .status {
            margin-left: auto; font-size: 0.85em;
            display: flex; align-items: center; gap: 6px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-on { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
        .dot-off { background: #666; }

        .toolbar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 24px;
            background: #151515; border-bottom: 1px solid #2a2a2a;
        }
        .url-bar {
            flex: 1; padding: 8px 14px;
            background: #222; border: 1px solid #333; border-radius: 8px;
            color: #e0e0e0; font-size: 0.9em; font-family: 'SF Mono', monospace;
            outline: none;
        }
        .url-bar:focus { border-color: #6366f1; }
        .nav-btn {
            padding: 8px 14px; background: #6366f1; color: white;
            border: none; border-radius: 8px; cursor: pointer;
            font-size: 0.85em; font-weight: 500;
        }
        .nav-btn:hover { background: #5558e6; }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .nav-btn.secondary { background: #333; }
        .nav-btn.secondary:hover { background: #444; }

        .browser-frame {
            position: relative;
            margin: 16px 24px;
            background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px;
            overflow: hidden; min-height: 500px;
        }
        .browser-frame img {
            width: 100%; display: block; cursor: pointer;
        }
        .browser-frame .loading {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: #1a1a1a; font-size: 0.9em; opacity: 0.5;
        }

        .pages-bar {
            display: flex; gap: 4px; padding: 8px 24px;
            background: #151515; border-bottom: 1px solid #2a2a2a;
            overflow-x: auto;
        }
        .tab {
            padding: 6px 14px; background: #222; border: 1px solid #333;
            border-radius: 6px; font-size: 0.8em; cursor: pointer;
            white-space: nowrap; max-width: 200px; overflow: hidden;
            text-overflow: ellipsis;
        }
        .tab.active { background: #6366f133; border-color: #6366f1; color: #a5b4fc; }
        .tab:hover { background: #2a2a2a; }

        .info-bar {
            padding: 12px 24px; font-size: 0.75em; opacity: 0.4;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect width="24" height="24" rx="6" fill="#6366f1"/>
            <circle cx="12" cy="10" r="4" stroke="white" stroke-width="1.5" fill="none"/>
            <path d="M8 18c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <h1>Phantom Bridge</h1>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="pages-bar" id="pagesBar"></div>

    <div class="toolbar">
        <button class="nav-btn secondary" onclick="goBack()" title="Back">←</button>
        <button class="nav-btn secondary" onclick="refresh()" title="Refresh">↻</button>
        <input class="url-bar" id="urlBar" placeholder="Enter URL and press Enter" onkeydown="if(event.key==='Enter')navigate()">
        <button class="nav-btn" onclick="navigate()">Go</button>
    </div>

    <div class="browser-frame" id="browserFrame" onclick="handleClick(event)">
        <div class="loading" id="loadingOverlay">
            <span>Starting bridge...</span>
        </div>
        <img id="screenshot" style="display:none;" alt="Browser view">
    </div>

    <div class="info-bar">
        Phantom Bridge — browsing through A0's internal Chromium. All sessions persist in the container.
        <br>Click anywhere on the screenshot to interact. The observer is watching and learning.
    </div>

    <script>
        let currentPageId = null;
        let pages = [];
        let refreshInterval = null;
        let screenshotInterval = null;

        async function api(action, params = {}) {
            const resp = await fetch("/plugin/phantom_bridge/api/proxy", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, ...params }),
            });
            return resp.json();
        }

        async function bridgeApi(action, params = {}) {
            const resp = await fetch("/plugin/phantom_bridge/api/bridge", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ action, ...params }),
            });
            return resp.json();
        }

        async function init() {
            // Check if bridge is running
            const status = await bridgeApi("status");
            if (!status.running) {
                // Start it
                document.getElementById("loadingOverlay").querySelector("span").textContent = "Starting bridge...";
                await bridgeApi("start");
                // Wait a moment for Chromium
                await new Promise(r => setTimeout(r, 2000));
            }

            await refreshPages();
            updateStatus(true);

            // Poll for screenshots
            screenshotInterval = setInterval(takeScreenshot, 1500);
            // Poll for page list
            refreshInterval = setInterval(refreshPages, 5000);
        }

        async function refreshPages() {
            const data = await api("pages");
            if (!data.ok || !data.pages) {
                updateStatus(false);
                return;
            }

            pages = data.pages.filter(p => p.type === "page");
            updateStatus(true);

            // Render tabs
            const bar = document.getElementById("pagesBar");
            bar.innerHTML = pages.map(p =>
                `<div class="tab ${p.id === currentPageId ? 'active' : ''}"
                     onclick="selectPage('${p.id}')"
                     title="${p.url}">${p.title || p.url || 'New Tab'}</div>`
            ).join("");

            // Auto-select first page
            if (!currentPageId && pages.length > 0) {
                selectPage(pages[0].id);
            }

            // Update URL bar
            const activePage = pages.find(p => p.id === currentPageId);
            if (activePage) {
                document.getElementById("urlBar").value = activePage.url || "";
            }
        }

        function selectPage(pageId) {
            currentPageId = pageId;
            refreshPages();
            takeScreenshot();
        }

        async function takeScreenshot() {
            if (!currentPageId) return;

            const data = await api("screenshot", { page_id: currentPageId });
            if (data.ok && data.screenshot) {
                const img = document.getElementById("screenshot");
                img.src = "data:image/jpeg;base64," + data.screenshot;
                img.style.display = "block";
                document.getElementById("loadingOverlay").style.display = "none";
            }
        }

        async function navigate() {
            const url = document.getElementById("urlBar").value.trim();
            if (!url) return;

            // Add protocol if missing
            let fullUrl = url;
            if (!url.startsWith("http://") && !url.startsWith("https://")) {
                fullUrl = "https://" + url;
            }

            if (!currentPageId && pages.length > 0) {
                currentPageId = pages[0].id;
            }

            if (currentPageId) {
                await api("navigate", { page_id: currentPageId, url: fullUrl });
                document.getElementById("urlBar").value = fullUrl;
                setTimeout(takeScreenshot, 1000);
                setTimeout(refreshPages, 1500);
            }
        }

        async function handleClick(event) {
            if (!currentPageId) return;

            const img = document.getElementById("screenshot");
            if (!img.naturalWidth) return;

            // Calculate click position relative to the actual browser viewport
            const rect = img.getBoundingClientRect();
            const scaleX = 1280 / rect.width;  // default viewport width
            const scaleY = 900 / rect.height;  // default viewport height

            const x = Math.round((event.clientX - rect.left) * scaleX);
            const y = Math.round((event.clientY - rect.top) * scaleY);

            // Send click via CDP
            try {
                const ws = pages.find(p => p.id === currentPageId);
                if (!ws) return;

                // Use the proxy to dispatch mouse events
                await fetch("/plugin/phantom_bridge/api/click", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ page_id: currentPageId, x, y }),
                });

                // Refresh after click
                setTimeout(takeScreenshot, 500);
                setTimeout(refreshPages, 1000);
            } catch (e) {
                console.error("Click failed:", e);
            }
        }

        function goBack() {
            // Could implement via CDP Page.goBack but for now just refresh
            refresh();
        }

        async function refresh() {
            await takeScreenshot();
            await refreshPages();
        }

        function updateStatus(connected) {
            const dot = document.getElementById("statusDot");
            const text = document.getElementById("statusText");
            dot.className = connected ? "dot dot-on" : "dot dot-off";
            text.textContent = connected ? `${pages.length} page(s)` : "Disconnected";
        }

        // Start
        init();
    </script>
</body>
</html>
